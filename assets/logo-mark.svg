<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="VivaBank logo">
  <defs>
    <!-- Dégradé principal corail → ambre -->
    <linearGradient id="vb-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF512F"/>
      <stop offset="100%" stop-color="#F09819"/>
    </linearGradient>

    <!-- Dégradé blanc pour les éléments intérieurs -->
    <linearGradient id="vb-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.82"/>
    </linearGradient>

    <!-- Lueur douce derrière l'icône -->
    <filter id="vb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF512F" flood-opacity="0.35"/>
    </filter>

    <!-- Brillance intérieure en haut -->
    <radialGradient id="vb-shine" cx="35%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Fond : bouclier arrondi moderne ───────────────── -->
  <rect x="2" y="2" width="60" height="60" rx="16"
        fill="url(#vb-main)" filter="url(#vb-shadow)"/>

  <!-- Brillance intérieure (effet premium) -->
  <rect x="2" y="2" width="60" height="60" rx="16"
        fill="url(#vb-shine)"/>

  <!-- ── Symbole : V stylisé avec montée dynamique ─────── -->
  <!--
      Concept : deux barres obliques blanches forment un "V"
      La barre gauche monte vers le coin haut-gauche,
      la barre droite vers le coin haut-droit.
      Au sommet du V, un diamant marque le point de convergence.
  -->

  <!-- Barre gauche du V -->
  <path d="M14 16 L32 44" stroke="url(#vb-inner)" stroke-width="6.5"
        stroke-linecap="round" fill="none"/>

  <!-- Barre droite du V -->
  <path d="M50 16 L32 44" stroke="url(#vb-inner)" stroke-width="6.5"
        stroke-linecap="round" fill="none"/>

  <!-- Accent : diamant doré au point bas du V -->
  <polygon points="32,48.5 35.5,44 32,39.5 28.5,44"
           fill="rgba(255,255,255,0.95)"/>

  <!-- Ligne horizontale fine en haut (symbolise la stabilité bancaire) -->
  <line x1="13" y1="14" x2="51" y2="14"
        stroke="rgba(255,255,255,0.45)" stroke-width="1.5"
        stroke-linecap="round"/>
</svg>
